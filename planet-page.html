<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Planet View - Solar System Explorer</title>
        <meta name="author" content="Jack Salloway" />
        <meta
            name="description"
            content="Informational page about the planet Mercury."
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../styles.css" />
    </head>
    <body>
        <div id="site-wrapper">
            <header id="site-header">
                <nav id="navbar">
                    <ul>
                        <li>
                            <a class="navbar-link" href="../index.html"
                                >Solar System Explorer</a
                            >
                        </li>
                        <li>
                            <a
                                class="navbar-link"
                                href="planet-page.html?planet=mercury"
                                >Mercury</a
                            >
                        </li>
                        <li>
                            <a
                                class="navbar-link"
                                href="planet-page.html?planet=venus"
                                >Venus</a
                            >
                        </li>
                        <li>
                            <a
                                class="navbar-link"
                                href="planet-page.html?planet=earth"
                                >Earth</a
                            >
                        </li>
                        <li>
                            <a
                                class="navbar-link"
                                href="planet-page.html?planet=mars"
                                >Mars</a
                            >
                        </li>
                        <li>
                            <a
                                class="navbar-link"
                                href="planet-page.html?planet=jupiter"
                            >
                                Jupiter
                            </a>
                        </li>
                        <li>
                            <a
                                class="navbar-link"
                                href="planet-page.html?planet=saturn"
                            >
                                Saturn
                            </a>
                        </li>
                        <li>
                            <a
                                class="navbar-link"
                                href="planet-page.html?planet=uranus"
                            >
                                Uranus
                            </a>
                        </li>
                        <li>
                            <a
                                class="navbar-link"
                                href="planet-page.html?planet=neptune"
                            >
                                Neptune
                            </a>
                        </li>
                    </ul>
                </nav>
            </header>
            <div class="planet-page-wrapper">
                <div class="info-column">
                    <div class="planet-info-pair">
                        <h2 class="planet-info-header">Orbital Period</h2>
                        <p id="orbital-period" class="planet-info-value">
                            0 Earth days
                        </p>
                    </div>
                    <div class="planet-info-pair">
                        <h2 class="planet-info-header">Diameter</h2>
                        <p id="diameter" class="planet-info-value">0 km</p>
                    </div>
                    <div class="planet-info-pair">
                        <h2 class="planet-info-header">Distance from Sun</h2>
                        <p id="distance-from-sun" class="planet-info-value">
                            0 million km
                        </p>
                    </div>
                    <div class="planet-info-pair">
                        <h2 class="planet-info-header">Number of Moons</h2>
                        <p id="number-of-moons" class="planet-info-value">0</p>
                    </div>
                    <div class="planet-info-pair">
                        <h2 class="planet-info-header">Surface Temperature</h2>
                        <p id="surface-temperature" class="planet-info-value">
                            0 degrees Celsius
                        </p>
                    </div>
                    <div class="planet-info-pair">
                        <h2 class="planet-info-header">Interesting Fact</h2>
                        <p id="interesting-fact" class="planet-info-value">
                            loading...
                        </p>
                    </div>

                    <p id="description" class="planet-page-paragraph">
                        loading...
                    </p>
                </div>
                <div class="visual-column">
                    <h1 id="planet-header" class="planet-page-header">
                        Planet
                    </h1>
                    <img
                        src="../images/mercury.jpg"
                        alt="An image of the planet Mercury"
                        class="planet-page-planet-image"
                    />
                </div>
            </div>
        </div>

        <!-- Inject script -->
        <script type="module" src="./js/planet-view.js"></script>
    </body>
</html>
